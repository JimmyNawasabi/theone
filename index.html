<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        :root {
            --gold: #d4af37;
            --velvet: #4b0082;
            --deep-grey: #1a1a1a;
            --soft-white: #e0e0e0;
            --accent-red: #8b0000;
            --charcoal: #2b2b2b;
        }

        body {
            background-color: var(--deep-grey);
            color: var(--soft-white);
            font-family: 'Georgia', serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #game-container {
            width: 95%;
            max-width: 900px;
            background: linear-gradient(135deg, var(--charcoal) 0%, #111 100%);
            border: 2px solid var(--gold);
            padding: 30px;
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
            border-radius: 8px;
        }

        h1, h2, h3 { color: var(--gold); text-align: center; text-transform: uppercase; letter-spacing: 3px; }
        
        .section { display: none; }
        .active { display: block; }

        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: var(--gold); font-variant: small-caps; }
        
        input, select {
            width: 100%;
            padding: 12px;
            background: #222;
            border: 1px solid var(--gold);
            color: white;
            box-sizing: border-box;
        }

        .btn {
            background: var(--gold);
            color: #000;
            padding: 15px 25px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            display: block;
            margin: 20px auto;
            width: 250px;
            transition: all 0.3s;
        }

        .btn:hover { background: #fff; box-shadow: 0 0 20px var(--gold); }

        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .item-list {
            background: rgba(0,0,0,0.3);
            border: 1px solid #444;
            padding: 15px;
            border-radius: 4px;
        }

        .task-box {
            background: rgba(75, 0, 130, 0.2);
            border-left: 5px solid var(--gold);
            padding: 25px;
            font-size: 1.2rem;
            line-height: 1.6;
            margin: 20px 0;
        }

        .timer { font-size: 4rem; text-align: center; color: var(--gold); margin: 20px 0; font-family: monospace; }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid var(--gold);
            padding-bottom: 15px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .card-display { display: flex; justify-content: center; gap: 20px; margin: 20px 0; }
        .card { padding: 10px 20px; border-radius: 4px; font-weight: bold; border: 2px solid #000; }
        .yellow-card { background: #ffd700; color: #000; }
        .red-card { background: var(--accent-red); color: #fff; }
        .inactive { opacity: 0.1; filter: grayscale(1); }

        .delete-btn { color: var(--accent-red); cursor: pointer; float: right; font-weight: bold; }
        
        /* Checkbox Styling */
        input[type="checkbox"] { width: auto; margin-right: 10px; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="setup-page" class="section active">
        <h1>The Gilded Cage</h1>
        <div class="input-group">
            <label>Master/Sub Player 1</label>
            <input type="text" id="p1-name" placeholder="Name">

        <div class="input-group">

                <option value="male">Penis Owner</option>

        </div>
        <div class="input-group">
            <label>Game Rounds (Default 20)</label>

        <button class="btn" onclick="goToInventory()">Configure Kit</button>
    </div>

    <div id="inventory-page" class="section">
        <h2>The Arsenal & Desires</h2>
        <div id="inventory-container" class="inventory-grid"></div>
        <hr style="border-color: var(--gold); margin: 30px 0;">
        <div class="item-list">
            <h3>Accepted Fetishes</h3>
            <div id="fetish-list"></div>

        <button class="btn" onclick="startGame()">Commence Play</button>
    </div>

    <div id="game-page" class="section">
        <div class="stats-bar">
            <div id="round-display">Round: 1/20</div>
            <div id="score-display">P1: 0 | P2: 0</div>
        </div>

        <div id="role-display" style="text-align: center; color: var(--gold); font-size: 1.2rem; margin-bottom: 20px;"></div>

        <div class="card-display">
            <div id="yellow-ui" class="card yellow-card inactive">Yellow Card</div>
            <div id="red-ui" class="card red-card inactive">Red Card</div>
        </div>

        <div id="master-choice-ui">
            <h3>Master's Choice</h3>
            <div id="realm-toggles" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px;"></div>
            <button class="btn" onclick="drawTask()">Draw Task</button>
        </div>

        <div id="task-ui" style="display:none;">
            <div class="task-box" id="task-desc"></div>
            <div class="timer" id="timer-display">00:00</div>
            <div id="action-buttons">
                <button class="btn" id="start-btn" onclick="startTimer()">Start Action</button>
                <button class="btn" id="yellow-btn" onclick="useYellowCard()" style="display:none; background:#ffd700;">Use Yellow Card</button>
                <button class="btn" id="red-btn" onclick="useRedCard()" style="display:none; background:var(--accent-red); color:white;">Use Red Card</button>
            </div>
            <div id="result-buttons" style="display:none; gap: 10px; justify-content: center;">
                <button class="btn" onclick="resolveTask(true)" style="background:green; color:white;">Success</button>
                <button class="btn" onclick="resolveTask(false)" style="background:var(--accent-red); color:white;">Failure</button>
            </div>
            <button class="btn" style="background:#000; color:red; width: 100%; border: 1px solid red;" onclick="triggerSafeword()">SAFEWORD</button>
        </div>
    </div>

    <div id="final-page" class="section">
        <h1 id="winner-name">Winner</h1>
        <div class="task-box" id="grand-prize-desc"></div>
        <button class="btn" onclick="location.reload()">Reset Game</button>
    </div>
</div>

<audio id="snd-whip" src="https://actions.google.com/sounds/v1/foley/whip_crack.ogg"></audio>
<audio id="snd-success" src="https://actions.google.com/sounds/v1/foley/wind_chime_short.ogg"></audio>

<script>

    p2: { name: "", gender: "", score: 0 },
    masterIdx: 0,
    subIdx: 1,
    currentRound: 1,
    maxRounds: 20,
    inventory: JSON.parse(localStorage.getItem('cage_inv')) || {
        Impact: ["Leather Paddle", "Rattan Cane", "Flogger"],
        Sensation: ["Ice Cubes", "Wartenberg Wheel", "Hot Wax", "Feather"],
        Restraints: ["Soft Rope", "Handcuffs", "Spreader Bar"],
        Gags: ["Ball Gag", "Spider Gag", "Cloth Wrap"],

        Toys: ["Vibrator", "Glass Wand", "Anal Plug"]
    },
    fetishes: JSON.parse(localStorage.getItem('cage_fetishes')) || ["Impact", "Light Breathplay", "Pet Play"],
    yellowCard: null,
    redCard: null,
    timer: null,
    currentTask: null,
    vetoed: JSON.parse(localStorage.getItem('cage_veto')) || []
};

// --- DATA INJECTION (Truncated for reliability, follow pattern to add more) ---
const taskDatabase = {
    shibari: [
        { text: "Master, tie the submissive’s wrists to their ankles in a tight hogtie using **[Restraints]**. Use the **[Gags]** to ensure they cannot plea for release.", time: 420 },
        { text: "Create a 'Gilded Cage' chest harness. Once bound, use **[Sensation]** to trace the rope patterns on their skin. The submissive must remain perfectly still.", time: 300 }
    ],
    tease: [
        { text: "Master, use **[Toys]** to bring the submissive to the very edge. When they are about to peak, stop and apply **[Sensation]** (ice). Repeat 3 times.", time: 480 },
        { text: "Apply **[Blindfolds]** and **[Gags]**. Master, perform oral stimulation. Stop every time the submissive's breathing hitches. No climax allowed.", time: 360 }
    ],
    escape: [ 
    { text: "Master, use tape or **[Stasis]** to bind the submissive's thumbs together behind their back and their big toes together. They have the duration of the timer to 'worm' across the floor and touch the Master's feet to be freed.", time: 180 },
    { text: "The submissive is bound to a fixed object with a series of 5 complex knots using **[Stasis]**. Master, apply **[Silence]**. The submissive must untie themselves using only their hands behind their back. If they fail, they lose a point.", time: 300 },
    { text: "Master, bind the submissive's wrists to their ankles. Place the **[Pleasure Tools]** on high inside their clothing. They must reach the 'off' switch using only their mouth or chin before the timer ends.", time: 120 },
    { text: "Using **[Stasis]**, bind the submissive in a seated position. Master will place a small object (the 'key') on their own body. The submissive must escape their bindings and retrieve the key using only their teeth.", time: 400 },
    { text: "Master, wrap the submissive's entire torso and arms in plastic wrap or tight **[Stasis]**. The submissive must burst or wriggle free. Master, you may use **[Impact]** to 'encourage' them throughout.", time: 240 }
],
        { text: "Master, use **[Restraints]** to bind the submissive's thumbs together behind their back. They have the duration of the timer to find a hidden object in the room.", time: 180 },
        { text: "The submissive is bound to a chair. Master, apply **[Gags]**. The submissive must wriggle out of the restraints before the whip cracks.", time: 300 }
    ],
    punish: [
        { text: "Justice: 15 strikes with **[Impact]** to the bottom. Mercy: Immediately after, use **[Sensation]** (warm oil) to massage the area until it glows.", time: 360 }
    ],
    dare: [
        { text: "Submissive, you must remain in a deep squat. Master will use **[Impact]** if your heels touch. Describe why you enjoy submitting.", time: 300 }
    ],
    self: [
        { text: "Submissive, use **[Restraints]** to tie your own ankles together. Then, slide your wrists into loops and tighten them. Master will inspect.", time: 240 }
    ],
    soft: [
        { text: "Master, enter the submissive slowly. Use **[Blindfolds]** so they can only feel your weight and movement. No fast thrusting.", time: 600 }
    ],
    sensory: [
        { text: "Master, apply **[Blindfolds]** and **[Gags]**. Use **[Sensation]** (Ice) on the genitals while using **[Toys]** on the nipples.", time: 300 }
    ]
};

const grandPrizes = [
    { text: "The Coronation: The winner takes the Master role. The loser is bound and the winner spends 45 minutes using the entire arsenal. Ends in a commanded climax." },
    { text: "The Ocean of Sensation: A 30-minute blindfolded session where the winner uses temperature play and vibration to drown the loser's senses." }
];

/** ENGINE FUNCTIONS **/

function goToInventory() {
    state.p1.name = document.getElementById('p1-name').value || "Player 1";
    state.p1.gender = document.getElementById('p1-gender').value;
    state.p2.name = document.getElementById('p2-name').value || "Player 2";
    state.p2.gender = document.getElementById('p2-gender').value;
    state.maxRounds = parseInt(document.getElementById('max-rounds').value) || 20;

    renderInventory();
    document.getElementById('setup-page').classList.remove('active');
    document.getElementById('inventory-page').classList.add('active');
}

function renderInventory() {
    const invDiv = document.getElementById('inventory-container');
    invDiv.innerHTML = "";
    for (let cat in state.inventory) {
        let html = `<div class="item-list"><h3>${catNames[cat]}</h3>`;
        state.inventory[cat].forEach(item => {
            html += `<div style="margin:5px 0;"><input type="checkbox" checked data-cat="${cat}" data-val="${item}"> ${item} <span class="delete-btn" onclick="deleteItem('${cat}','${item}')">&times;</span></div>`;
        });
        html += `<input type="text" placeholder="Add..." onkeydown="if(event.key==='Enter') addItem('${cat}', this.value)"></div>`;
        invDiv.innerHTML += html;
    }

    const fetDiv = document.getElementById('fetish-list');
    fetDiv.innerHTML = "";
    state.fetishes.forEach(f => {
        fetDiv.innerHTML += `<div style="margin:5px 0;"><input type="checkbox" checked class="fetish-check" value="${f}"> ${f} <span class="delete-btn" onclick="deleteFetish('${f}')">&times;</span></div>`;
    });
}

function addItem(cat, val) {
    if(!val) return;
    state.inventory[cat].push(val);
    save();
    renderInventory();
}

function deleteItem(cat, val) {
    state.inventory[cat] = state.inventory[cat].filter(i => i !== val);
    save();
    renderInventory();
}

function addFetish() {
    let val = document.getElementById('new-fetish').value;
    if(!val) return;
    state.fetishes.push(val);
    save();
    renderInventory();
    document.getElementById('new-fetish').value = "";
}

function deleteFetish(val) {
    state.fetishes = state.fetishes.filter(f => f !== val);
    save();
    renderInventory();
}

function save() {
    localStorage.setItem('cage_inv', JSON.stringify(state.inventory));
    localStorage.setItem('cage_fetishes', JSON.stringify(state.fetishes));
}

function startGame() {
    // Randomize roles
    if(Math.random() > 0.5) { state.masterIdx = 0; state.subIdx = 1; } 
    else { state.masterIdx = 1; state.subIdx = 0; }

    // Assign Cards
    const r = Math.random();
    if(r < 0.3) state.yellowCard = 0; else if(r < 0.6) state.yellowCard = 1;
    if(Math.random() < 0.4) state.redCard = (state.yellowCard === 0) ? 1 : 0;

    // Render Realm Toggles
    const rt = document.getElementById('realm-toggles');
    rt.innerHTML = "";
    for(let key in realmNames) {
        rt.innerHTML += `<label><input type="checkbox" class="realm-box" value="${key}" checked> ${realmNames[key]}</label>`;
    }

    updateUI();
    document.getElementById('inventory-page').classList.remove('active');
    document.getElementById('game-page').classList.add('active');
}

function updateUI() {
    const p1 = state.p1; const p2 = state.p2;
    document.getElementById('round-display').innerText = `Round: ${state.currentRound}/${state.maxRounds}`;
    document.getElementById('score-display').innerText = `${p1.name}: ${p1.score} | ${p2.name}: ${p2.score}`;
    
    const master = (state.masterIdx === 0) ? p1 : p2;
    const sub = (state.subIdx === 0) ? p1 : p2;
    document.getElementById('role-display').innerText = `${master.name} (Master) & ${sub.name} (Submissive)`;

    document.getElementById('yellow-ui').className = `card yellow-card ${state.yellowCard === null ? 'inactive' : ''}`;
    document.getElementById('red-ui').className = `card red-card ${state.redCard === null ? 'inactive' : ''}`;
}

function drawTask() {
    const activeRealms = Array.from(document.querySelectorAll('.realm-box:checked')).map(b => b.value);
    if(activeRealms.length === 0) return alert("Choose a Realm.");

    const rKey = activeRealms[Math.floor(Math.random() * activeRealms.length)];
    const pool = taskDatabase[rKey];
    let rawTask = pool[Math.floor(Math.random() * pool.length)];

    // Replace place holders
    let text = rawTask.text;
    for(let cat in catNames) {
        let items = state.inventory[cat];
        let item = items[Math.floor(Math.random() * items.length)];
        text = text.replace(`[${cat}]`, `<b style="color:var(--gold)">${item}</b>`);
    }

    state.currentTask = { ...rawTask, text: text };
    document.getElementById('task-desc').innerHTML = text;
    document.getElementById('timer-display').innerText = formatTime(rawTask.time);
    
    document.getElementById('master-choice-ui').style.display = 'none';
    document.getElementById('task-ui').style.display = 'block';
    document.getElementById('start-btn').style.display = 'block';
    document.getElementById('result-buttons').style.display = 'none';

    // Show card buttons if held
    document.getElementById('yellow-btn').style.display = (state.yellowCard === state.subIdx) ? 'inline-block' : 'none';
    document.getElementById('red-btn').style.display = (state.redCard !== null) ? 'inline-block' : 'none';
}

function startTimer() {
    let sec = state.currentTask.time;
    document.getElementById('start-btn').style.display = 'none';
    document.getElementById('yellow-btn').style.display = 'none';
    document.getElementById('red-btn').style.display = 'none';

    state.timer = setInterval(() => {
        sec--;
        document.getElementById('timer-display').innerText = formatTime(sec);
        if(sec <= 0) {
            clearInterval(state.timer);
            document.getElementById('snd-whip').play();
            document.getElementById('result-buttons').style.display = 'flex';
        }
    }, 1000);
}

function formatTime(s) {
    let m = Math.floor(s / 60);
    let rs = s % 60;
    return `${m}:${rs < 10 ? '0'+rs : rs}`;
}

function resolveTask(success) {
    if(success) {
        if(state.subIdx === 0) state.p1.score++; else state.p2.score++;
        document.getElementById('snd-success').play();
        // Role swap
        let temp = state.masterIdx; state.masterIdx = state.subIdx; state.subIdx = temp;
    } else {
        if(state.subIdx === 0) state.p1.score--; else state.p2.score--;
        if(Math.random() > 0.7) alert("WHIM: Immediate 1-minute punishment required.");
    }

    state.currentRound++;
    if(state.currentRound > state.maxRounds) {
        showFinal();
    } else {
        document.getElementById('task-ui').style.display = 'none';
        document.getElementById('master-choice-ui').style.display = 'block';
        updateUI();
    }
}

function useYellowCard() {
    let temp = state.masterIdx; state.masterIdx = state.subIdx; state.subIdx = temp;
    state.yellowCard = (state.yellowCard === 0) ? 1 : 0;
    alert("Roles Swapped!");
    document.getElementById('task-ui').style.display = 'none';
    document.getElementById('master-choice-ui').style.display = 'block';
    updateUI();
}

function useRedCard() {
    state.redCard = (state.redCard === 0) ? 1 : 0;
    alert("Task Skipped!");
    document.getElementById('task-ui').style.display = 'none';
    document.getElementById('master-choice-ui').style.display = 'block';
    updateUI();
}

function triggerSafeword() {
    if(state.subIdx === 0) state.p1.score -= 5; else state.p2.score -= 5;
    clearInterval(state.timer);
    alert("SAFEWORD: Play paused. Submissive loses 5 points.");
    document.getElementById('task-ui').style.display = 'none';
    document.getElementById('master-choice-ui').style.display = 'block';
    updateUI();
}

function showFinal() {
    document.getElementById('game-page').style.display = 'none';
    document.getElementById('final-page').classList.add('active');
    const winner = (state.p1.score >= state.p2.score) ? state.p1 : state.p2;
    document.getElementById('winner-name').innerText = `${winner.name} Wins!`;
    document.getElementById('grand-prize-desc').innerText = grandPrizes[Math.floor(Math.random()*grandPrizes.length)].text;
}

</script>
</body>
</html>
