                <button onclick="deleteItem('${cat}', '${item}')" style="background:none; color:red; border:none; cursor:pointer;">&times;</button>
            </div>`;
        });
        html += `<input type="text" placeholder="Add..." onkeydown="if(event.key==='Enter') addItem('${cat}', this.value)"></div>`;
        container.innerHTML += html;
    }

    document.getElementById('setup-page').classList.remove('active');
    document.getElementById('inventory-page').classList.add('active');
}

function addItem(cat, val) {
    if(!val) return;
    state.inventory[cat].push(val);
    saveData();
    showInventory();
}

function deleteItem(cat, val) {
    state.inventory[cat] = state.inventory[cat].filter(i => i !== val);
    saveData();
    showInventory();
}

function toggleItem(cat, item) {
    // Logic for per-round active items
}

function saveData() {
    localStorage.setItem('cage_inv', JSON.stringify(state.inventory));
}

function startGame() {
    // Randomize initial roles
    if (Math.random() > 0.5) {
        state.masterIdx = 0; state.subIdx = 1;
    } else {
        state.masterIdx = 1; state.subIdx = 0;
    }

    // Assign cards
    const r = Math.random();
    if(r < 0.25) { state.yellowCardHolder = 0; state.redCardHolder = 1; }
    else if(r < 0.5) { state.yellowCardHolder = 1; state.redCardHolder = 0; }
    else if(r < 0.75) { state.yellowCardHolder = 0; state.redCardHolder = null; }
    else { state.yellowCardHolder = null; state.redCardHolder = 1; }

    renderCategoryToggles();
    updateUI();
    document.getElementById('inventory-page').classList.remove('active');
    document.getElementById('game-page').classList.add('active');
}

function renderCategoryToggles() {
    const container = document.getElementById('category-toggles');
    container.innerHTML = "";
    taskRealms.forEach(realm => {
        container.innerHTML += `<label><input type="checkbox" class="realm-check" value="${realm.id}" checked> ${realm.name}</label>`;
    });
}

function updateUI() {
    document.getElementById('round-display').innerText = `Round: ${state.currentRound}/${state.maxRounds}`;
    document.getElementById('score-display').innerText = 
        `${state.players[0].name}: ${state.players[0].score} | ${state.players[1].name}: ${state.players[1].score}`;
    
    document.getElementById('role-announcement').innerText = 
        `${state.players[state.masterIdx].name} is Master | ${state.players[state.subIdx].name} is Submissive`;

    // Cards
    document.getElementById('yellow-card-ui').className = `card yellow-card ${state.yellowCardHolder === null ? 'inactive' : ''}`;
    document.getElementById('red-card-ui').className = `card red-card ${state.redCardHolder === null ? 'inactive' : ''}`;
    
    // Card buttons
    document.getElementById('yellow-btn').style.display = (state.yellowCardHolder === state.subIdx) ? 'block' : 'none';
    document.getElementById('red-btn').style.display = (state.redCardHolder !== null) ? 'block' : 'none';
}

function generateTask() {
    const checkedRealms = Array.from(document.querySelectorAll('.realm-check:checked')).map(i => i.value);
    if(checkedRealms.length === 0) return alert("Select at least one Realm.");

    const realm = checkedRealms[Math.floor(Math.random() * checkedRealms.length)];
    const pool = taskDatabase[realm] || taskDatabase['shibari']; // Fallback
    let task = pool[Math.floor(Math.random() * pool.length)];

    // Parse items into text
    let processedText = task.text;
    for (let cat in categories) {
        const items = state.inventory[cat];
        const randomItem = items[Math.floor(Math.random() * items.length)];
        processedText = processedText.replace(`[${cat}]`, `<strong>${randomItem}</strong>`);
    }

    state.currentTask = { ...task, text: processedText };
    document.getElementById('task-text').innerHTML = processedText;
    document.getElementById('timer-display').innerText = formatTime(task.time);
    
    document.getElementById('master-controls').style.display = 'none';
    document.getElementById('task-display').style.display = 'block';
    document.getElementById('start-btn').style.display = 'block';
    document.getElementById('post-task-btns').style.display = 'none';
}

function startTimer() {
    let timeLeft = state.currentTask.time;
    document.getElementById('start-btn').style.display = 'none';
    document.getElementById('yellow-btn').style.display = 'none';
    document.getElementById('red-btn').style.display = 'none';

    state.timer = setInterval(() => {
        timeLeft--;
        document.getElementById('timer-display').innerText = formatTime(timeLeft);
        if(timeLeft <= 0) {
            clearInterval(state.timer);
            document.getElementById('sound-timer').play();
            document.getElementById('post-task-btns').style.display = 'flex';
        }
    }, 1000);
}

function formatTime(seconds) {
    const mins = Math.floor(seconds / 60);
    const secs = seconds % 60;
    return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
}

function resolveTask(success) {
    if(success) {
        state.players[state.subIdx].score += 1;
        document.getElementById('sound-success').play();
        // Role swap
        let temp = state.masterIdx;
        state.masterIdx = state.subIdx;
        state.subIdx = temp;
    } else {
        state.players[state.subIdx].score -= 1;
        document.getElementById('sound-fail').play();
        // Random punishment whim?
        if(Math.random() > 0.7) alert("WHIM: Submissive must endure 1 minute of Master's choice of Sensation immediately.");
    }

    state.currentRound++;
    if(state.currentRound > state.maxRounds) {
        endGame();
    } else {
        resetRound();
    }
}

function resetRound() {
    clearInterval(state.timer);
    document.getElementById('task-display').style.display = 'none';
    document.getElementById('master-controls').style.display = 'block';
    updateUI();
}

function triggerSafeword() {
    state.players[state.subIdx].score -= 5;
    alert("SAFEWORD TRIGGERED. Play paused. Submissive loses 5 points.");
    resetRound();
}

function useYellowCard() {
    let temp = state.masterIdx;
    state.masterIdx = state.subIdx;
    state.subIdx = temp;
    state.yellowCardHolder = state.masterIdx; // Card passes to other
    alert("Roles Swapped!");
    resetRound();
}

function useRedCard() {
    state.redCardHolder = (state.redCardHolder === 0) ? 1 : 0;
    alert("Task Skipped!");
    resetRound();
}

function endGame() {
    document.getElementById('game-page').classList.remove('active');
    document.getElementById('final-page').classList.add('active');
    
    const winner = state.players[0].score >= state.players[1].score ? state.players[0] : state.players[1];
    document.getElementById('winner-announcement').innerText = `${winner.name} is the Ultimate Winner!`;
    
    const prize = grandPrizes[Math.floor(Math.random() * grandPrizes.length)];
    document.getElementById('grand-prize-text').innerHTML = prize.text;
}

</script>
</body>
</html>
