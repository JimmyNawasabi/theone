<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Gilded Cage: Ultimate Edition</title>
    <style>
        :root {
            --gold: #d4af37;
            --velvet: #4b0082;
            --deep-grey: #1a1a1a;
            --soft-white: #e0e0e0;
            --accent-red: #8b0000;
            --charcoal: #2b2b2b;
        }

        body {
            background-color: var(--deep-grey);
            color: var(--soft-white);
            font-family: 'Georgia', serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #game-container {
            width: 95%;
            max-width: 900px;
            background: linear-gradient(135deg, var(--charcoal) 0%, #111 100%);
            border: 2px solid var(--gold);
            padding: 30px;
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
            border-radius: 8px;
        }

        h1, h2, h3 { color: var(--gold); text-align: center; text-transform: uppercase; letter-spacing: 3px; }
        
        .section { display: none; }
        .active { display: block; }

        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: var(--gold); font-variant: small-caps; }
        
        input, select {
            width: 100%;
            padding: 12px;
            background: #222;
            border: 1px solid var(--gold);
            color: white;
            box-sizing: border-box;
        }

        .btn {
            background: var(--gold);
            color: #000;
            padding: 15px 25px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            display: block;
            margin: 10px auto;
            width: 250px;
            transition: all 0.3s;
        }

        .btn:hover { background: #fff; box-shadow: 0 0 20px var(--gold); }

        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .item-list {
            background: rgba(0,0,0,0.3);
            border: 1px solid #444;
            padding: 15px;
            border-radius: 4px;
        }

        .task-box {
            background: rgba(75, 0, 130, 0.2);
            border-left: 5px solid var(--gold);
            padding: 25px;
            font-size: 1.2rem;
            line-height: 1.6;
            margin: 20px 0;
        }

        .timer { font-size: 4rem; text-align: center; color: var(--gold); margin: 20px 0; font-family: monospace; }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid var(--gold);
            padding-bottom: 15px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .card-display { display: flex; justify-content: center; gap: 20px; margin: 20px 0; }
        .card { padding: 10px 20px; border-radius: 4px; font-weight: bold; border: 2px solid #000; }
        .yellow-card { background: #ffd700; color: #000; }
        .red-card { background: var(--accent-red); color: #fff; }
        .inactive { opacity: 0.1; filter: grayscale(1); }

        .delete-btn { color: var(--accent-red); cursor: pointer; float: right; font-weight: bold; }
        input[type="checkbox"] { width: auto; margin-right: 10px; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="setup-page" class="section active">
        <h1>The Gilded Cage</h1>
        <div class="input-group">
            <label>Player 1 (Name & Anatomy)</label>
            <input type="text" id="p1-name" placeholder="Name">
            <select id="p1-gender">
                <option value="male">Penis Owner</option>
                <option value="female">Vulva Owner</option>
            </select>
        </div>
        <div class="input-group">
            <label>Player 2 (Name & Anatomy)</label>
            <input type="text" id="p2-name" placeholder="Name">
            <select id="p2-gender">
                <option value="male">Penis Owner</option>
                <option value="female">Vulva Owner</option>
            </select>
        </div>
        <div class="input-group">
            <label>Rounds</label>
            <input type="number" id="max-rounds" value="15">
        </div>
        <button class="btn" onclick="goToInventory()">Next: Configure Kit</button>
    </div>

    <div id="inventory-page" class="section">
        <h2>Your Arsenal</h2>
        <div id="inventory-container" class="inventory-grid"></div>
        <button class="btn" onclick="startGame()">Start Game</button>
    </div>

    <div id="game-page" class="section">
        <div class="stats-bar">
            <div id="round-display">Round: 1</div>
            <div id="score-display">Scores</div>
        </div>

        <div id="role-display" style="text-align: center; color: var(--gold); margin-bottom: 10px;"></div>

        <div class="card-display">
            <div id="yellow-ui" class="card yellow-card inactive">Yellow Card</div>
            <div id="red-ui" class="card red-card inactive">Red Card</div>
        </div>

        <div id="master-choice-ui">
            <h3>Master's Choice</h3>
            <div id="realm-toggles" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px;"></div>
            <button class="btn" onclick="drawTask()">Draw Task</button>
        </div>

        <div id="task-ui" style="display:none;">
            <div class="task-box" id="task-desc"></div>
            <div class="timer" id="timer-display">00:00</div>
            
            <div id="action-controls">
                <button class="btn" id="start-btn" onclick="startTimer()">Start Timer</button>
                <div id="early-resolve" style="display:none; gap: 10px; justify-content: center;">
                    <button class="btn" onclick="resolveTask(true)" style="background:green; color:white; width: 120px;">Success</button>
                    <button class="btn" onclick="resolveTask(false)" style="background:var(--accent-red); color:white; width: 120px;">Failure</button>
                </div>
            </div>

            <div style="margin-top: 20px;">
                <button class="btn" id="yellow-btn" onclick="useYellowCard()" style="display:none; background:#ffd700;">Yellow (Swap Roles)</button>
                <button class="btn" id="red-btn" onclick="useRedCard()" style="display:none; background:var(--accent-red); color:white;">Red (Skip Task)</button>
            </div>
            
            <button class="btn" style="background:#000; color:red; width: 100%; margin-top: 30px;" onclick="triggerSafeword()">SAFEWORD</button>
        </div>
    </div>

    <div id="final-page" class="section">
        <h1 id="winner-name"></h1>
        <div class="task-box" id="grand-prize-desc"></div>
        <button class="btn" onclick="location.reload()">New Session</button>
    </div>
</div>

<audio id="snd-whip" src="https://actions.google.com/sounds/v1/foley/whip_crack.ogg"></audio>

<script>
/** 1. DATA **/
const catNames = {
    Impact: "Impact Tools",
    Sensation: "Sensory Items",
    Restraints: "Restraints",
    Gags: "Gags",
    Blindfolds: "Blindfolds",
    Toys: "Toys"
};

const realmNames = {
    shibari: "Art of Cord",
    escape: "Great Escape",
    tease: "The Brink",
    punish: "Justice & Mercy",
    dare: "The Reckoning",
    soft: "Languid Lust",
    sensory: "Overload"
};

let state = {
    p1: { name: "", gender: "", score: 0 },
    p2: { name: "", gender: "", score: 0 },
    masterIdx: 0,
    subIdx: 1,
    currentRound: 1,
    maxRounds: 15,
    inventory: JSON.parse(localStorage.getItem('cage_inv_v2')) || {
        Impact: ["Leather Paddle", "Flogger", "Cane"],
        Sensation: ["Ice Cubes", "Warm Wax", "Feather"],
        Restraints: ["Rope", "Handcuffs"],
        Gags: ["Ball Gag", "Spider Gag"],
        Blindfolds: ["Silk Blindfold"],
        Toys: ["Vibrator", "Anal Plug"]
    },
    yellowCard: null,
    redCard: null,
    timer: null,
    currentTask: null
};

/** 2. TASK DATABASE (MASSIVE EXPANSION) **/
const taskDatabase = {
    shibari: [
        { text: "Master, tie the submissive’s wrists to their ankles in a tight hogtie using **[Restraints]**. Use **[Gags]** to silence them. They must stay in this position.", time: 420 },
        { text: "Create a 'Goddess' harness across the chest. Once bound, use **[Sensation]** to trace the rope patterns on their skin. Perfect stillness required.", time: 300 },
        { text: "Bind the submissive's arms in a 'Takate Kote' (box tie). Use a secondary line to pull the elbows together. Apply **[Blindfolds]**.", time: 480 },
        { text: "Tie the submissive's ankles to a chair. Master, use **[Impact]** to rhythmically snap the rope tails against their inner thighs.", time: 360 }
    ],
    tease: [
        { text: "Master, use **[Toys]** to bring the submissive to the edge. Stop and apply **[Sensation]** (ice) immediately. Repeat 3 times. No climax.", time: 480 },
        { text: "Apply **[Blindfolds]** and **[Gags]**. Master, perform oral stimulation. Stop every time the submissive's breathing hitches.", time: 360 },
        { text: "The submissive is bound in **[Restraints]**. Master, use your tongue and **[Toys]**. Force them to count down from 100 by 7s. Fail = **[Impact]**.", time: 300 },
        { text: "Master, use **[Sensation]** (warm oil) to massage the genitals. Stop just before the peak and walk away for 60 seconds.", time: 420 }
    ],
    punish: [
        { text: "Justice: 15 strikes with **[Impact]** to the bottom. Mercy: Master immediately follows with a warm massage using **[Sensation]**.", time: 300 },
        { text: "Justice: Submissive is placed in a painful stress position. Mercy: Master provides oral attention for the remainder of the timer.", time: 420 },
        { text: "Justice: Apply **[Gags]** and use **[Sensation]** (Wartenberg wheel) on the inner arms. Mercy: Master licks the marks clean.", time: 300 }
    ],
    escape: [
        { text: "Master, use **[Restraints]** to bind the sub's thumbs together. They must find the hidden 'key' (a small object) in the room to be freed.", time: 180 },
        { text: "Submissive is bound to a chair. Master, apply **[Gags]**. The submissive must wriggle out before the timer ends.", time: 300 },
        { text: "Bind wrists to ankles. Place **[Toys]** on high inside underwear. They must reach the 'off' switch using only their mouth.", time: 120 }
    ],
    dare: [
        { text: "Submissive must maintain a 'plank' position. Master uses **[Sensation]** on their back. If they drop, start over + **[Impact]**.", time: 180 },
        { text: "The submissive must describe every sensation they feel while the Master uses **[Toys]**. If they stop talking, apply **[Gags]**.", time: 360 }
    ],
    soft: [
        { text: "Master, enter the submissive slowly. Use **[Blindfolds]** so they can only feel your weight. Slow, deep intimacy. No rush.", time: 600 },
        { text: "Master, use **[Sensation]** (silk/fur) to caress the body while performing oral sex. Melt the submissive into the bed.", time: 480 }
    ],
    sensory: [
        { text: "Apply **[Blindfolds]** and **[Gags]**. Use three different **[Sensation]** items at once (ice, feather, warm hand). Keep them guessing.", time: 300 },
        { text: "Master, use **[Toys]** on two different areas while playing loud music. Submissive must lose themselves in the noise.", time: 360 }
    ]
};

const grandPrizes = [
    { text: "The Coronation: Winner takes the Master role. Loser is bound for 45 minutes of continuous play with the entire arsenal. Climax granted only on command." },
    { text: "The Ocean of Sensation: Blindfold and bind the loser. Winner uses temperature play, vibration, and mouth to overwhelm them for 30 minutes." }
];

/** 3. CORE LOGIC **/

function goToInventory() {
    state.p1.name = document.getElementById('p1-name').value || "Player 1";
    state.p1.gender = document.getElementById('p1-gender').value;
    state.p2.name = document.getElementById('p2-name').value || "Player 2";
    state.p2.gender = document.getElementById('p2-gender').value;
    state.maxRounds = parseInt(document.getElementById('max-rounds').value) || 15;

    renderInv();
    document.getElementById('setup-page').classList.remove('active');
    document.getElementById('inventory-page').classList.add('active');
}

function renderInv() {
    const container = document.getElementById('inventory-container');
    container.innerHTML = "";
    for(let cat in state.inventory) {
        let h = `<div class="item-list"><h3>${catNames[cat]}</h3>`;
        state.inventory[cat].forEach(i => {
            h += `<div>${i}</div>`;
        });
        h += `</div>`;
        container.innerHTML += h;
    }
}

function startGame() {
    state.masterIdx = Math.random() > 0.5 ? 0 : 1;
    state.subIdx = state.masterIdx === 0 ? 1 : 0;
    
    // Assign one random card
    if(Math.random() > 0.5) state.yellowCard = state.subIdx;
    else state.redCard = state.subIdx;

    const rt = document.getElementById('realm-toggles');
    rt.innerHTML = "";
    for(let key in realmNames) {
        rt.innerHTML += `<label><input type="checkbox" class="realm-box" value="${key}" checked> ${realmNames[key]}</label>`;
    }

    updateUI();
    document.getElementById('inventory-page').classList.remove('active');
    document.getElementById('game-page').classList.add('active');
}

function updateUI() {
    const p1 = state.p1; const p2 = state.p2;
    document.getElementById('round-display').innerText = `Round: ${state.currentRound}/${state.maxRounds}`;
    document.getElementById('score-display').innerText = `${p1.name}: ${p1.score} | ${p2.name}: ${p2.score}`;
    
    const master = (state.masterIdx === 0) ? p1 : p2;
    const sub = (state.subIdx === 0) ? p1 : p2;
    document.getElementById('role-display').innerText = `Master: ${master.name} | Submissive: ${sub.name}`;

    document.getElementById('yellow-ui').className = `card yellow-card ${state.yellowCard === null ? 'inactive' : ''}`;
    document.getElementById('red-ui').className = `card red-card ${state.redCard === null ? 'inactive' : ''}`;
}

function drawTask() {
    const realms = Array.from(document.querySelectorAll('.realm-box:checked')).map(b => b.value);
    if(realms.length === 0) return alert("Select at least one realm.");

    const r = realms[Math.floor(Math.random() * realms.length)];
    const pool = taskDatabase[r];
    let task = pool[Math.floor(Math.random() * pool.length)];

    let text = task.text;
    for(let cat in catNames) {
        let items = state.inventory[cat];
        let item = items[Math.floor(Math.random() * items.length)];
        text = text.replace(`[${cat}]`, `<b style="color:var(--gold)">${item}</b>`);
    }

    state.currentTask = { ...task, text: text };
    document.getElementById('task-desc').innerHTML = text;
    document.getElementById('timer-display').innerText = format(task.time);
    
    document.getElementById('master-choice-ui').style.display = 'none';
    document.getElementById('task-ui').style.display = 'block';
    document.getElementById('start-btn').style.display = 'block';
    document.getElementById('early-resolve').style.display = 'none';

    document.getElementById('yellow-btn').style.display = (state.yellowCard === state.subIdx) ? 'block' : 'none';
    document.getElementById('red-btn').style.display = (state.redCard === state.subIdx) ? 'block' : 'none';
}

function startTimer() {
    let s = state.currentTask.time;
    document.getElementById('start-btn').style.display = 'none';
    document.getElementById('early-resolve').style.display = 'flex';

    state.timer = setInterval(() => {
        s--;
        document.getElementById('timer-display').innerText = format(s);
        if(s <= 0) {
            clearInterval(state.timer);
            document.getElementById('snd-whip').play();
        }
    }, 1000);
}

function resolveTask(success) {
    clearInterval(state.timer);
    if(success) {
        if(state.subIdx === 0) state.p1.score++; else state.p2.score++;
        // Swap roles for next round
        let t = state.masterIdx; state.masterIdx = state.subIdx; state.subIdx = t;
    } else {
        if(state.subIdx === 0) state.p1.score--; else state.p2.score--;
    }

    state.currentRound++;
    if(state.currentRound > state.maxRounds) {
        finish();
    } else {
        document.getElementById('task-ui').style.display = 'none';
        document.getElementById('master-choice-ui').style.display = 'block';
        updateUI();
    }
}

function useYellowCard() {
    let t = state.masterIdx; state.masterIdx = state.subIdx; state.subIdx = t;
    state.yellowCard = null;
    alert("Yellow Card Used: Roles Swapped!");
    document.getElementById('task-ui').style.display = 'none';
    document.getElementById('master-choice-ui').style.display = 'block';
    updateUI();
}

function useRedCard() {
    state.redCard = null;
    alert("Red Card Used: Task Skipped!");
    document.getElementById('task-ui').style.display = 'none';
    document.getElementById('master-choice-ui').style.display = 'block';
    updateUI();
}

function triggerSafeword() {
    clearInterval(state.timer);
    alert("GAME HALTED. Safety check required.");
    location.reload();
}

function finish() {
    document.getElementById('game-page').style.display = 'none';
    document.getElementById('final-page').classList.add('active');
    const winner = state.p1.score >= state.p2.score ? state.p1 : state.p2;
    document.getElementById('winner-name').innerText = `${winner.name} Wins!`;
    document.getElementById('grand-prize-desc').innerText = grandPrizes[Math.floor(Math.random()*grandPrizes.length)].text;
}

function format(s) {
    let m = Math.floor(s/60); let rs = s%60;
    return `${m}:${rs < 10 ? '0'+rs : rs}`;
}
</script>
</body>
</html>
